<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mario Mobile</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #222; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Екран гри */
        canvas { 
            background: linear-gradient(#5c94fc, #b0e0e6); 
            display: block; 
            width: 100%; 
            flex-grow: 1;
            touch-action: none;
        }

        /* Панель керування */
        .controls {
            height: 160px;
            background: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-top: 4px solid #444;
        }

        .move-btns { display: flex; gap: 20px; }
        
        .btn {
            width: 75px;
            height: 75px;
            background: #555;
            border: 4px solid #777;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            font-weight: bold;
            user-select: none;
        }

        .btn:active { background: #888; transform: scale(0.95); }
        .jump-btn { 
            width: 90px; 
            height: 90px; 
            background: #e74c3c; 
            border-color: #c0392b; 
            border-radius: 50%; 
        }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<div class="controls">
    <div class="move-btns">
        <div class="btn" id="left">←</div>
        <div class="btn" id="right">→</div>
    </div>
    <div class="btn jump-btn" id="up">UP</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Налаштування розмірів
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 160;
}
window.addEventListener('resize', resize);
resize();

const player = {
    x: 50, y: 0, w: 32, h: 48,
    color: '#e74c3c',
    dx: 0, dy: 0,
    speed: 5, jump: 14,
    gravity: 0.8, grounded: false
};

const platforms = [
    { x: 0, y: canvas.height - 40, w: 3000, h: 40 }, // Земля
    { x: 100, y: canvas.height - 120, w: 120, h: 20 },
    { x: 280, y: canvas.height - 200, w: 120, h: 20 },
    { x: 450, y: canvas.height - 130, w: 150, h: 20 },
    { x: 650, y: canvas.height - 250, w: 100, h: 20 }
];

const input = { left: false, right: false, up: false };

function bind(id, key) {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); input[key] = true; };
    const end = (e) => { e.preventDefault(); input[key] = false; };
    el.addEventListener('touchstart', start);
    el.addEventListener('touchend', end);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', end);
}

bind('left', 'left');
bind('right', 'right');
bind('up', 'up');

function update() {
    if (input.left) player.dx = -player.speed;
    else if (input.right) player.dx = player.speed;
    else player.dx = 0;

    if (input.up && player.grounded) {
        player.dy = -player.jump;
        player.grounded = false;
    }

    player.dy += player.gravity;
    player.x += player.dx;
    player.y += player.dy;

    // Колізії
    player.grounded = false;
    for (let p of platforms) {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            if (player.dy > 0 && player.y + player.h - player.dy <= p.y) {
                player.y = p.y - player.h;
                player.dy = 0;
                player.grounded = true;
            }
        }
    }

    if (player.x < 0) player.x = 0;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Платформи
    ctx.fillStyle = '#8b4513';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // Маріо
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // Кепка
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x, player.y, player.w, 10);

    requestAnimationFrame(() => { update(); draw(); });
}
draw();
</script>
</body>
</html>
