<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mario HTML5</title>
    <style>
        body { margin: 0; background: #333; overflow: hidden; font-family: Arial; }
        canvas { display: block; background: #5c94fc; margin: 0 auto; border-bottom: 2px solid #000; }
        
        /* Стилі для сенсорного керування */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 150px;
            background: #222;
            padding: 10px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: #666;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            user-select: none;
            touch-action: manipulation;
        }
        .btn:active { background: #999; }
        .jump-btn { background: #e74c3c; width: 90px; height: 90px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="controls">
    <div class="btn" id="leftBtn">←</div>
    <div class="btn" id="rightBtn">→</div>
    <div class="btn jump-btn" id="jumpBtn">ВГОРУ</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Адаптація розміру під екран
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 150;

const player = {
    x: 50,
    y: 200,
    width: 30,
    height: 30,
    color: 'red',
    speed: 5,
    dx: 0,
    dy: 0,
    jumpForce: 12,
    gravity: 0.6,
    grounded: false
};

const platforms = [
    { x: 0, y: canvas.height - 40, width: 2000, height: 40 }, // Земля
    { x: 150, y: canvas.height - 120, width: 100, height: 20 },
    { x: 300, y: canvas.height - 200, width: 100, height: 20 },
    { x: 500, y: canvas.height - 150, width: 150, height: 20 }
];

// Стан кнопок
const keys = { left: false, right: false, up: false };

// Обробка сенсорних кнопок
function setupBtn(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
}

setupBtn('leftBtn', 'left');
setupBtn('rightBtn', 'right');
setupBtn('jumpBtn', 'up');

function update() {
    // Рух по горизонталі
    if (keys.left) player.dx = -player.speed;
    else if (keys.right) player.dx = player.speed;
    else player.dx = 0;

    // Стрибок
    if (keys.up && player.grounded) {
        player.dy = -player.jumpForce;
        player.grounded = false;
    }

    // Гравітація
    player.dy += player.gravity;
    player.x += player.dx;
    player.y += player.dy;

    // Колізія з платформами
    player.grounded = false;
    platforms.forEach(rect => {
        if (player.x < rect.x + rect.width &&
            player.x + player.width > rect.x &&
            player.y < rect.y + rect.height &&
            player.y + player.height > rect.y) {
            
            // Якщо падаємо на платформу зверху
            if (player.dy > 0 && player.y + player.height - player.dy <= rect.y) {
                player.y = rect.y - player.height;
                player.dy = 0;
                player.grounded = true;
            }
        }
    });

    // Межі екрана
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Малюємо платформу
    ctx.fillStyle = '#8b4513';
    platforms.forEach(rect => {
        ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
    });

    // Малюємо гравця (Маріо)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    
    // Очі "Маріо" для напрямку
    ctx.fillStyle = 'white';
    let eyeOffset = keys.left ? 5 : 20;
    ctx.fillRect(player.x + eyeOffset, player.y + 5, 5, 5);

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
